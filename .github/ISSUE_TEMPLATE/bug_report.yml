name: Bug report
description: Report a reproducible problem with the TUI, CLI, download, translation, or rendering workflow.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve the project. Please remove private video paths, Twitch OAuth values, API keys, and personal chat content before submitting.
  - type: input
    id: version
    attributes:
      label: Project version or commit
      description: Use a release tag (for example v0.2.3) or the output of git log -1 --oneline for a Git checkout.
      placeholder: v0.2.3
    validations:
      required: true
  - type: dropdown
    id: entry-point
    attributes:
      label: Where did the problem occur?
      options:
        - TUI (run.bat)
        - Recovery or advanced CLI (run_cli.bat)
        - Download page or TwitchDownloaderCLI
        - Translation
        - Rendering or output video
        - Installation or environment check
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Operating system and Python version
      placeholder: Windows 11, Python 3.12
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Environment check (recommended)
      description: Run run_cli.bat doctor (Windows) or python scripts/render_cn_chat.py --doctor. Paste only the pass/fail summary; never paste .env or credentials.
      render: text
  - type: input
    id: media
    attributes:
      label: Media summary (optional)
      description: For video/chat/download/render issues, give a non-private summary such as MP4, 20 min, 1920x1080, VOD segment 1:00-1:10.
      placeholder: MP4, 12:30, 1920x1080, original preview
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use sample or redacted paths and a bounded VOD time range where possible.
      placeholder: |
        1. Open ...
        2. Choose ...
        3. Start ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Include the exact visible error or behavior.
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot or screen recording (optional)
      description: Attach only redacted images. Do not show credentials, private paths, or private chat messages.
  - type: textarea
    id: diagnostic
    attributes:
      label: Diagnostic export (optional)
      description: In TUI, use History and Artifacts > Export diagnostic, then review and redact paths or private content before sharing. Do not paste API keys, OAuth tokens, environment files, commands containing credentials, or private chat content.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed API keys, OAuth tokens, private paths, and personal chat content.
          required: true
