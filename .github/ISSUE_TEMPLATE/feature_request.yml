name: Feature request
description: Propose an improvement to the user workflow.
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the workflow rather than only a preferred implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: Explain what a normal user should be able to do and what result they should see.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Relevant area
      options:
        - First-run setup
        - TUI task workflow
        - Download or VOD handling
        - Translation or review
        - Rendering quality or performance
        - Diagnostics or recovery
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
