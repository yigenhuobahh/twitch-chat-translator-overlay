name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install release verification dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-wqy-zenhei
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Run release gates
        env:
          PYTHONPATH: scripts
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: python scripts/run_tests.py --max --coverage

      - name: Build release artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build --outdir dist
          python - <<'PY'
          import os
          from pathlib import Path
          import tomllib

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          assert tag == f"v{version}", f"tag {tag} does not match project version {version}"
          PY
          sha256sum dist/*.whl dist/*.tar.gz > dist/SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.ref_name }}-artifacts
          path: dist/
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.whl dist/*.tar.gz dist/SHA256SUMS.txt \
            --title "$GITHUB_REF_NAME" --generate-notes
